apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 677856868029.dkr.ecr.eu-west-3.amazonaws.com/s3drive-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: s3drive-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080