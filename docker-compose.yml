services:
  backend:
    build: ./backend
    environment:
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - SPRING_APPLICATION_JSON={"aws.accessKeyId":"${AWS_ACCESS_KEY}","aws.secretKey":"${AWS_SECRET_KEY}","aws.region":"${AWS_REGION}","aws.bucketName":"${AWS_BUCKET_NAME}","cors.allowed-origins":"${ALLOWED_ORIGINS}"}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend